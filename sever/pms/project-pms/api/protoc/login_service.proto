syntax = "proto3";
package login.service.v1;
option go_package = "project-pms/pkg/service/room.service.v1";


message CaptchaMessage {
  string mobile = 1;
}
message CaptchaResponse{
  string code = 1;
}

message  RegisterMessage{
  string hotel_name = 1;
  string username = 2;
  string password = 3;
  string newPassword = 4;
  string mobile = 5;
}
message  RegisterResponse{
}


message LoginMessage {
  string username = 1;
  string password = 2;
  string token = 3;
}
message LoginResponse{
  MemberMessage member = 1;
  TokenMessage tokenList = 2;
}
message MemberMessage {
  int64 id = 1;
  string hotel_name = 2;
  int32 status = 3;
}

message TokenMessage{
  string accessToken = 1;
  string refreshToken = 2;
  string tokenType = 3;
  int64 accessTokenExp = 4;
}

message  ChangePasswordMessage{
  string username = 1;
  string password = 2;
  string newPassword = 3;
}
message  ChangePasswordResponse{
}

service LoginService {
  rpc GetCaptcha(CaptchaMessage) returns (CaptchaResponse) {}
  rpc Register(RegisterMessage) returns (RegisterResponse) {}
  rpc Login(LoginMessage) returns (LoginResponse) {}
  rpc ChangePassword(ChangePasswordMessage) returns (ChangePasswordResponse) {}
  rpc TokenVerify(LoginMessage) returns (LoginResponse) {}
}