syntax = "proto3";
package order.service.v1;
option go_package = "project-order/pkg/service/order.service.v1";



message OrderInfMessage {
    int64 id = 1;
    int64 hotel_id = 2;
    string guest_room_no = 3;
    string guest_name = 4;
    string guest_id_no = 5;
    int64 real_price = 6;
    string mobile = 7;
    string check_in_time = 8;
    string check_out_time = 9;
}

message OrderInfResponse {
}

service OrderService {
  rpc OrderInf(OrderInfMessage) returns (OrderInfResponse) {}
}