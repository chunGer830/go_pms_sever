services:
  mysql:
    container_name: mysql8
    image: mysql:${MYSQL_VERSION}
    restart: always
    ports:
      - ${MYSQL_PORT}:3306
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: pms
    volumes:
      - ${MYSQL_DIR}/data:/var/lib/mysql
      - ${MYSQL_DIR}/conf:/etc/mysql/conf.d/
      - ${MYSQL_DIR}/logs:/logs
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
  redis:
    container_name: redis6
    image: redis:${REDIS_VERSION}
    restart: always
    volumes:
      - ${REDIS_DIR}/data:/data
      - ${REDIS_DIR}/conf/redis.conf:/etc/redis/redis.conf
    ports:
      - ${REDIS_PORT}:6379
    command: redis-server /etc/redis/redis.conf
  etcd:
    container_name: etcd3
    image: bitnami/etcd:${ETCD_VERSION}
    restart: always
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
    privileged: true
    volumes:
      - ${ETCD_DIR}/data:/bitnami/etcd/data
    ports:
      - ${ETCD_PORT}:2379
      - 2380:2380
  project-pms:
    container_name: project-pms
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE_DIR: project-pms
    restart: always
    depends_on:
      - mysql
      - redis
      - etcd
    volumes:
      - /srv/pms/logs:/srv/pms/logs
    ports:
      - ${PMS_PORT}:8080
  project-room:
    container_name: project-room
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE_DIR: project-room
    restart: always
    depends_on:
      - mysql
      - redis
      - etcd
    volumes:
      - /srv/pms/logs:/srv/pms/logs
    ports:
      - ${ROOM_PORT}:8081
  project-computer:
    container_name: project-computer
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE_DIR: project-computer
    restart: always
    depends_on:
      - mysql
      - redis
      - etcd
    volumes:
      - /srv/pms/logs:/srv/pms/logs
    ports:
      - ${COMPUTER_PORT}:8082
  project-api:
    container_name: project-api
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE_DIR: project-api
    restart: always
    depends_on:
      - etcd
      - project-pms
      - project-room
      - project-computer
    volumes:
      - /srv/pms/logs:/srv/pms/logs
    ports:
      - ${API_PORT}:80
