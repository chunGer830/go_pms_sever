services:
  mysql:
    container_name: mysql8
    image: mysql:${MYSQL_VERSION}
    restart: always
    ports:
      - ${MYSQL_PORT}:3306
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: pms
    volumes:
      - ${MYSQL_DIR}/data:/var/lib/mysql
      - ${MYSQL_DIR}/conf:/etc/mysql/conf.d/
      - ${MYSQL_DIR}/logs:/logs
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
  redis:
    container_name: redis6
    image: redis:${REDIS_VERSION}
    restart: always
    volumes:
      - ${REDIS_DIR}/data:/data
      - ${REDIS_DIR}/conf/redis.conf:/etc/redis/redis.conf
    ports:
      - ${REDIS_PORT}:6379
    command: redis-server /etc/redis/redis.conf
  etcd:
    container_name: etcd3
    image: quay.io/coreos/etcd:${ETCD_VERSION}
    restart: always
    command:
      - /usr/local/bin/etcd
      - --name=etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd=http://etcd:2380
      - --initial-cluster-state=new
    volumes:
      - ${ETCD_DIR}/data:/etcd-data
    ports:
      - ${ETCD_PORT}:2379
      - 2380:2380
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
  project-pms:
    container_name: project-pms
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE_DIR: project-pms
    restart: always
    depends_on:
      - mysql
      - redis
      - etcd
    volumes:
      - /srv/pms/logs:/srv/pms/logs
    ports:
      - ${PMS_PORT}:8080
  project-room:
    container_name: project-room
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE_DIR: project-room
    restart: always
    depends_on:
      - mysql
      - redis
      - etcd
    volumes:
      - /srv/pms/logs:/srv/pms/logs
    ports:
      - ${ROOM_PORT}:8081
  project-computer:
    container_name: project-computer
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE_DIR: project-computer
    restart: always
    depends_on:
      - mysql
      - redis
      - etcd
    volumes:
      - /srv/pms/logs:/srv/pms/logs
    ports:
      - ${COMPUTER_PORT}:8082
  project-api:
    container_name: project-api
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE_DIR: project-api
    restart: always
    depends_on:
      - etcd
      - project-pms
      - project-room
      - project-computer
    volumes:
      - /srv/pms/logs:/srv/pms/logs
    ports:
      - ${API_PORT}:80

  es:
    container_name: es
    image: elasticsearch:8.6.0
    volumes:
      - ${ES_DIR}/data:/usr/share/elasticsearch/data
      - ${ES_DIR}/logs:/usr/share/elasticsearch/logs
      - ${ES_DIR}/plugins:/usr/share/elasticsearch/plugins
    ports:
      - 9200:9200
      - 9300:9300
    environment:
      - node.name=es
      - cluster.name=elasticsearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    privileged: true
  kibana:
    image: kibana:8.6.0
    container_name: kibana
    depends_on:
      - es
    environment:
      SERVER_NAME: kibana
      SERVER_HOST: "0.0.0.0"
      ELASTICSEARCH_HOSTS: http://es:9200
    ports:
      - 5601:5601