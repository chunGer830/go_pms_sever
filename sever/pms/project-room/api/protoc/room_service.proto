syntax = "proto3";
package room.service.v1;
option go_package = "project-room/pkg/service/order.service.v1";

message RoomTypeMessage{
    int64  hotel_id = 1;
}

message RoomTypeItem {
    string type_name = 1;
    string type_code = 2;
    int32 max_occupancy = 3;
    int64 base_price = 4; // 单位：分
    int32 quantity = 5;
    int32 status = 6;
    int64  id             = 7;
}

message RoomTypeResponse {
    repeated RoomTypeItem list = 1;
}


message SaveRoomTypeMessage{
    int64  hotel_id = 1;
    string type_name = 2;
    string type_code = 3;
    int32 max_occupancy = 4;
    int64 base_price = 5; // 单位：分
    int32 quantity = 6;
    int32 status = 7;
    int64  id             = 8;
}

message SaveRoomTypeResponse {
}

message UpdateRoomTypeMessage{
    int64  hotel_id = 1;
    string type_name = 2;
    string type_code = 3;
    int32 max_occupancy = 4;
    int64 base_price = 5; // 单位：分
    int32 quantity = 6;
    int32 status = 7;
    int64  id             = 8;
}

message UpdateRoomTypeResponse {
}

message DeleteRoomTypeMessage{
    int64  hotel_id = 1;
    string type_code = 2;
}

message DeleteRoomTypeResponse {
}

message HotelRoomMessage{
    int64  hotel_id = 1;
}

message HotelRoomItem {
    string room_no        = 1;
    string room_type_name = 2;
    string floor_no       = 3;
    string building       = 4;
    string phone_ext      = 5;
    string description    = 6;
    int64  id             = 7;
}

message HotelRoomResponse {
    repeated HotelRoomItem list = 1;
}

message SaveHotelRoomMessage {
    int64  hotel_id       = 1;
    string room_no        = 2;
    string room_type_name = 3;
    string room_type_code = 4;
    string floor_no       = 5;
    string building       = 6;
    string phone_ext      = 7;
    string description    = 8;
    int64  id             = 9;
}

message SaveHotelRoomResponse {
}

message UpdateHotelRoomMessage {
    int64  hotel_id       = 1;
    string room_no        = 2;
    string room_type_name = 3;
    string room_type_code = 4;
    string floor_no       = 5;
    string building       = 6;
    string phone_ext      = 7;
    string description    = 8;
    int64  id             = 9;
}

message UpdateHotelRoomResponse {
}

message DeleteHotelRoomMessage{
    int64  hotel_id = 1;
    string room_no  = 2;
}

message DeleteHotelRoomResponse {
}

message RoomGuestStayMessage{
    int64  hotel_id = 1;
}

message RoomGuestStayItem {
    int64 id = 1;
    int64 hotel_id = 2;
    string guest_room_no = 3;
    string guest_name = 4;
    string guest_id_no = 5;
    int64 real_price = 6;
    string mobile = 7;
    string check_in_time = 8;
    string check_out_time = 9;
    int32 stay_status = 10;
    string description = 11;
}

message RoomGuestStayResponse {
    repeated RoomGuestStayItem list = 1;
}

message UpdateRoomGuestStayMessage {
    int64 id = 1;
    int64 hotel_id = 2;
    string guest_room_no = 3;
    string guest_name = 4;
    string guest_id_no = 5;
    int64 real_price = 6;
    string mobile = 7;
    string check_in_time = 8;
    string check_out_time = 9;
    int32 stay_status = 10;
    string description = 11;
}

message UpdateRoomGuestStayResponse {
}

service RoomService {
  rpc RoomType(RoomTypeMessage) returns (RoomTypeResponse) {}
  rpc SaveRoomType(SaveRoomTypeMessage) returns (SaveRoomTypeResponse) {}
  rpc UpdateRoomType(UpdateRoomTypeMessage) returns (UpdateRoomTypeResponse) {}
  rpc DeleteRoomType(DeleteRoomTypeMessage) returns (DeleteRoomTypeResponse) {}

  rpc HotelRoom(HotelRoomMessage) returns (HotelRoomResponse) {}
  rpc SaveHotelRoom(SaveHotelRoomMessage) returns (SaveHotelRoomResponse) {}
  rpc UpdateHotelRoom(UpdateHotelRoomMessage) returns (UpdateHotelRoomResponse) {}
  rpc DeleteHotelRoom(DeleteHotelRoomMessage) returns (DeleteHotelRoomResponse) {}

  rpc RoomGuestStay(RoomGuestStayMessage) returns (RoomGuestStayResponse) {}
  rpc UpdateRoomGuestStay(UpdateRoomGuestStayMessage) returns (UpdateRoomGuestStayResponse) {}
}